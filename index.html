<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="선스타 KM-2080P 자수 패턴 에디터 — 브라우저에서 바로 사용하는 전문 자수 디지타이징 도구">
  <meta name="theme-color" content="#f8f9fa">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>선스타 패턴 에디터</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <!-- 도구 사이드바 -->
  <nav id="toolbar">
    <div style="height: 12px;"></div>
    <button class="tool-btn active" data-tool="select"><span>🖱</span><span class="tooltip">선택 (V)</span></button>
    <button class="tool-btn" data-tool="hand"><span>✋</span><span class="tooltip">이동 (H)</span></button>
    
    <div class="tool-divider"></div>
    
    <!-- 스티치 통합 도구 -->
    <div class="stitch-tool-wrap">
      <button class="tool-btn" id="stitch-master"><span>〰</span><span class="tooltip">스티치</span></button>
      <div class="stitch-sub-menu">
        <button class="tool-btn sub-btn" data-tool="line"><span>📏</span><span class="tooltip">직선 (L)</span></button>
        <button class="tool-btn sub-btn" data-tool="arch"><span>🌙</span><span class="tooltip">호/곡선 (A)</span></button>
        <button class="tool-btn sub-btn" data-tool="curve"><span>🖌</span><span class="tooltip">자유곡선 (F)</span></button>
        <button class="tool-btn sub-btn" data-tool="circle"><span>⭕</span><span class="tooltip">원 (C)</span></button>
        <button class="tool-btn sub-btn" data-tool="rect"><span>⬜</span><span class="tooltip">사각형 (R)</span></button>
      </div>
    </div>

    <button class="tool-btn" data-tool="node"><span>📍</span><span class="tooltip">노드편집 (N)</span></button>
    <button class="tool-btn" data-tool="eraser"><span>🧹</span><span class="tooltip">지우기 (E)</span></button>
    
    <div style="margin-top: auto;">
      <button class="tool-btn" id="btn-help-func"><span>❓</span><span class="tooltip">도움말</span></button>
    </div>
  </nav>

  <!-- 상단 바 -->
  <header id="topbar">
    <div class="topbar-actions">
      <button class="icon-btn" id="btn-undo" title="되돌리기">↩</button>
      <button class="icon-btn" id="btn-redo-top" title="다시실행">↪</button>
      <button class="btn-top btn-danger-text" id="btn-clear-all" style="margin-left: 20px;">전체삭제</button>
    </div>
  </header>

  <!-- 카메라 모달 -->
  <div id="camera-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0, 0, 0, 0.95); z-index:9999; flex-direction:column; align-items:center; justify-content:center; backdrop-filter: blur(12px);">
    <div style="position:relative; width: 90%; max-width: 800px; border-radius: 20px; overflow: hidden; box-shadow: 0 24px 48px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); background: #000;">
      <video id="camera-video" autoplay playsinline style="width:100%; display:block;"></video>
      <canvas id="camera-preview" style="position:absolute; top:0; left:0; width:100%; height:100%; display:none; object-fit:contain; background:transparent;"></canvas>
      <div id="camera-guideline" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:80%; height:80%; border:2px dashed rgba(255,255,255,0.5); pointer-events:none; border-radius: 12px;"></div>
      <div id="camera-message" style="position:absolute; top:20px; left:50%; transform:translateX(-50%); background:rgba(231,76,60,0.95); color:white; padding:10px 20px; border-radius:30px; font-size:14px; display:none;">패턴을 인식할 수 없습니다.</div>
    </div>
    <div style="margin-top:30px; display:flex; gap:16px;" id="camera-controls">
      <button id="btn-capture" class="btn-top">📸 촬영하기</button>
      <button id="btn-close-camera" class="btn-top">취소</button>
    </div>
    <div style="margin-top:30px; display:none; gap:16px;" id="camera-preview-controls">
      <button id="btn-apply-pattern" class="btn-top" style="background: var(--accent); color: #fff;">✨ 패턴 적용</button>
      <button id="btn-recapture" class="btn-top">🔄 다시 촬영</button>
    </div>
  </div>

  <!-- 왼쪽 패널 (트레이스 및 패턴) -->
  <aside id="left-panel">
    <div class="panel-section">
      <div class="panel-title">트레이스 설정</div>
      <div class="trace-controls">
        <div class="control-row">
          <label>밝기</label>
          <input type="range" id="trace-brightness" min="0" max="200" value="100">
        </div>
        <div class="control-row">
          <label>대비</label>
          <input type="range" id="trace-contrast" min="0" max="200" value="100">
        </div>
        <div class="control-row">
          <label>투명도</label>
          <input type="range" id="trace-opacity" min="0" max="100" value="50">
        </div>
      </div>
    </div>
    
    <div class="panel-section" style="border-top: 1px solid var(--border);">
      <div class="panel-title">자수 패턴 라이브러리</div>
      <div class="pattern-grid">
        <button class="pattern-btn" data-preset="floral">🌸 Floral</button>
        <button class="pattern-btn" data-preset="bohemian">🌿 Bohemian</button>
        <button class="pattern-btn" data-preset="geometry">📐 Geometry</button>
        <button class="pattern-btn" data-preset="sashiko">🧵 Sashiko</button>
        <button class="pattern-btn" data-preset="smocking">🐝 Smocking</button>
      </div>
    </div>
  </aside>

  <!-- 캔버스 영역 -->
  <main id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="floating-preview" style="position:absolute; top:20px; right:20px; width:240px; height:180px; background:#fff; border-radius:12px; border:1px solid var(--border); overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,0.12); z-index:40; display: none; flex-direction: column;">
      <div style="padding: 6px 10px; background: #f8f9fa; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 11px; font-weight: 600;">캡처 미리보기</span>
        <button id="btn-clear-preview" style="background: none; border: none; cursor: pointer; color: var(--danger); font-size: 14px;">✕</button>
      </div>
      <div id="preview-img-wrap" style="flex: 1; position: relative; background: #000; overflow: hidden;"></div>
    </div>
    <div id="hud"></div>
    <div id="pos">0, 0</div>
  </main>

  <!-- 오른쪽 패널 -->
  <aside id="right-panel">
    <div class="prop-group">
      <div class="panel-title">카메라에서 불러오기</div>
      <button class="btn-large-accent" id="btn-camera">📷 사진 촬영</button>
    </div>
    
    <div class="prop-group">
      <div class="panel-title">스티치 기법</div>
      <div class="stitch-tech-grid">
        <button class="stitch-tech-btn active" data-stitch="running">러닝 (Running)</button>
        <button class="stitch-tech-btn" data-stitch="satin">새틴 (Satin)</button>
        <button class="stitch-tech-btn" data-stitch="fill">채우기 (Fill)</button>
        <button class="stitch-tech-btn" data-stitch="chain">체인 (Chain)</button>
        <button class="stitch-tech-btn" data-stitch="knot">매듭 (Knot)</button>
      </div>
    </div>

    <div class="prop-group">
      <div class="panel-title">상세 설정</div>
      <div class="prop-label">밀도 (Density) <span id="val-density">2.0</span>mm</div>
      <div class="slider-row">
        <input type="range" id="sl-density" min="0.5" max="5" step="0.5" value="2">
      </div>
      <div class="prop-label">각도 (Angle) <span id="val-angle">0°</span></div>
      <div class="slider-row">
        <input type="range" id="sl-angle" min="0" max="180" step="15" value="0">
      </div>
      <div class="prop-label">색상 (Color)</div>
      <div class="color-row">
        <input type="color" id="inp-color" value="#4361ee">
        <span class="slider-val" id="val-color">#4361ee</span>
      </div>
    </div>

    <div class="bottom-actions" style="margin-top: auto; padding-top: 20px;">
      <button class="btn-filled" id="btn-export" style="width: 100%;">💾 DST 저장</button>
    </div>
  </aside>

  <!-- 상태 바 -->
  <footer id="statusbar">
    <span id="status-tool">도구: 선택</span>
    <span id="status-objs">오브젝트: 0</span>
    <label style="display:flex; align-items:center; gap:6px; cursor:pointer;" class="snap-toggle">
      <input type="checkbox" id="chk-snap" checked> <span class="snap-label">스냅 (1mm)</span>
    </label>
    <span style="margin-left:auto; opacity: 0.7;">스크롤: 확대/축소 | 우클릭 드래그: 이동</span>
  </footer>

  <!-- 토스트 알림 -->
  <div id="toast-container" style="position:fixed; top:24px; right:24px; z-index:10000; display:flex; flex-direction:column; gap:12px; pointer-events:none;"></div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
